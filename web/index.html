<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>beta-credible — Bayesian proportion inference</title>
    <link data-trunk rel="rust"/>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 760px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #222;
        background: #fafafa;
      }
      h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
      h2 { font-size: 1.1rem; margin-top: 2rem; margin-bottom: 0.5rem; border-bottom: 1px solid #ddd; padding-bottom: 0.25rem; }
      .desc { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; }
      .form-group { display: flex; flex-wrap: wrap; gap: 1rem; align-items: flex-end; margin-bottom: 1rem; }
      .field { display: flex; flex-direction: column; gap: 0.25rem; }
      label { font-size: 0.85rem; font-weight: 600; }
      input[type="number"], input[type="text"] {
        padding: 0.4rem 0.6rem;
        border: 1px solid #bbb;
        border-radius: 4px;
        font-size: 1rem;
        width: 120px;
      }
      button {
        padding: 0.45rem 1.2rem;
        background: #3a7bd5;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1rem;
      }
      button:hover { background: #2f67b8; }
      .result {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 1rem 1.2rem;
        margin-top: 1rem;
        font-family: monospace;
        white-space: pre-wrap;
        font-size: 0.92rem;
        line-height: 1.6;
      }
      .error { color: #c0392b; }
      .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; }
      .tab {
        padding: 0.5rem 1.2rem;
        cursor: pointer;
        border: 1px solid #bbb;
        border-right: none;
        background: #eee;
        font-size: 0.95rem;
      }
      .tab:last-child { border-right: 1px solid #bbb; border-radius: 0 4px 4px 0; }
      .tab:first-child { border-radius: 4px 0 0 4px; }
      .tab.active { background: #3a7bd5; color: #fff; border-color: #3a7bd5; }
    </style>
  </head>
  <body>
  </body>
</html>
